<!DOCTYPE html>
<html lang="vi">
<head>

  <title>Du lịch Kiên Giang</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero" id="hero">

  <div class="hero-bg" id="bg2"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo glass-nav">🏝 Travel Kiên Giang</div>

    <ul class="menu">
      <li>
        <a class="glass-menu"
           href="places/phuquoc.html"
           data-bg="assets/images/phuquoc.png"
           data-title="PHÚ QUỐC"
           data-desc="Đảo ngọc – thiên đường du lịch biển đảo Việt Nam">
          Phú Quốc
        </a>
      </li>

      <li>
        <a class="glass-menu"
           href="places/honson.html"

        </a>
      </li>

      <li>
        <a class="glass-menu"
           href="places/hatien.html"
           data-bg="assets/images/hatien.png"
           data-title="HÀ TIÊN"
           data-desc="Thành phố biên giới giàu cảnh sắc">
          Hà Tiên
        </a>
      </li>

      <li>
        <a class="glass-menu"
           href="places/thachsung.html"
           data-bg="assets/images/thachsung.png"
           data-title="THẠCH ĐỘNG"
           data-desc="Danh thắng huyền thoại Kiên Giang">
          Thạch Động
        </a>
      </li>
    </ul>
  </nav>

  <!-- HERO CONTENT -->
  <div class="hero-content">
    <div class="hero-glass">
      <h1 id="place-title">PHÚ QUỐC</h1>
      <p id="place-desc">
        Đảo ngọc – thiên đường du lịch biển đảo Việt Nam
      </p>
    </div>
  </div>

</section>

<script src="main.js"></script>
</body>
</html>
